services:
  postgres:
    build:
      context: ./docker
    container_name: prices-postgres
    environment:
      POSTGRES_USER: prices
      POSTGRES_PASSWORD: prices
      POSTGRES_DB: prices
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prices -d prices"]
      interval: 5s
      timeout: 5s
      retries: 15
    volumes:
      - prices_postgres_data:/var/lib/postgresql/data

volumes:
  prices_postgres_data:
